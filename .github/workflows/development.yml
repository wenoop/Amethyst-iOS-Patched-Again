name: Development build

on:
  workflow_dispatch:

jobs:
  build:
    name: Development build
    strategy:
      matrix:
        include:
          - platform: 2
            platform_name: ios
    
    runs-on: macos-26

    steps:
      - name: Remove work folders
        run: |
          echo "before"
          ls -lah ./
          rm -rf ./* || true
          rm -rf ./.??* || true
          echo "after"
          ls -lah ./

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Checkout repository submodules
        run: git submodule update --init --recursive

      # No explicit Xcode pin needed — macos-26's default is already
      # Xcode 26.4.1 as of May 2026, matching what upstream's log showed.
      # If you want it locked down for reproducibility instead of "whatever's default":
      # - name: Select Xcode 26.4.1
      #   run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Install dpkg
        run: |
          brew install dpkg fakeroot || true

      - name: Install GNU Make (gmake)
        run: brew install make

      - name: Install JDK 8
        run: |
          brew install --cask temurin@8
          java -version

      - name: Install ldid
        run: brew install ldid

      - name: Build for ${{ matrix.platform_name }}
        run: |
          export PATH=/usr/sbin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
          sysctl -n hw.ncpu
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }}

      - name: Upload regular ipa
        uses: actions/upload-artifact@main
        with:
          name: org.angelauramc.amethyst-${{ matrix.platform_name }}.ipa
          path: artifacts/org.angelauramc.amethyst-*-${{ matrix.platform_name }}.ipa
