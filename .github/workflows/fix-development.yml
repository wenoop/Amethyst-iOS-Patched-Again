      - name: Show changes
        run: |
          git status --short
          git diff --stat

      - name: Commit synced result
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync upstream and reapply approved toolchain patches"

      - name: Push updated branch
        run: |
          git push --force-with-lease origin HEAD:main
